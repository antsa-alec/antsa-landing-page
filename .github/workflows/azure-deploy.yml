name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  APP_NAME: 'antsa-landing-au-production'
  RESOURCE_GROUP: 'production'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build
      env:
        NODE_ENV: production

    - name: Install backend dependencies
      run: npm ci --production
      working-directory: backend

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Backup production database before deploy
      continue-on-error: true
      run: |
        echo "📦 Downloading production database backup..."
        BACKUP_FILE="content-$(date -u +%Y%m%d-%H%M%S).db"
        
        # Fetch Kudu credentials dynamically — no extra secret required
        KUDU_CREDS=$(az webapp deployment list-publishing-credentials \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --name ${{ env.APP_NAME }} \
          --query "{u:publishingUserName,p:publishingPassword}" \
          -o json)
        KUDU_USER=$(echo "$KUDU_CREDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['u'])")
        KUDU_PASS=$(echo "$KUDU_CREDS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['p'])")
        
        HTTP_STATUS=$(curl -s -o "${BACKUP_FILE}" -w "%{http_code}" \
          -u "${KUDU_USER}:${KUDU_PASS}" \
          "https://antsa-landing-au-production.scm.azurewebsites.net/api/vfs/data/content.db")
        
        if [ "$HTTP_STATUS" = "200" ] && [ -s "${BACKUP_FILE}" ]; then
          echo "✅ Database backup saved: ${BACKUP_FILE} ($(du -sh ${BACKUP_FILE} | cut -f1))"
        else
          echo "⚠️  Could not download DB backup (status: ${HTTP_STATUS}) — may be first deploy"
          rm -f "${BACKUP_FILE}"
        fi

    - name: Upload database backup as artifact
      uses: actions/upload-artifact@v4
      with:
        name: db-backup-${{ github.run_number }}
        path: content-*.db
        if-no-files-found: ignore
        retention-days: 30

    - name: Prune root devDependencies for shipping
      # `npm ci` above installed vite/typescript/etc. needed for the build.
      # The Vike SSR bundle in dist/server/ imports vike/react/express/better-sqlite3
      # at runtime, all of which are in root `dependencies`. Pruning leaves just
      # those so we can ship root node_modules without the build toolchain.
      run: npm prune --production

    - name: Create deployment package
      run: |
        mkdir -p deploy
        cp -r dist deploy/
        cp -r backend deploy/
        # Root node_modules holds runtime deps the SSR bundle resolves
        # (vike/server, react-dom/server, @ant-design/cssinjs, better-sqlite3,
        # express). Ship them alongside backend/node_modules.
        cp -r node_modules deploy/
        cp package.json deploy/package-root.json
        cp startup.sh deploy/startup.sh
        chmod +x deploy/startup.sh

        # Top-level package.json invokes startup.sh. We keep our root deps in
        # package-root.json so npm at the wwwroot level doesn't try to reinstall.
        cat > deploy/package.json << 'EOF'
        {
          "name": "antsa-landing-page",
          "version": "1.0.0",
          "scripts": {
            "start": "bash /home/site/wwwroot/startup.sh"
          },
          "dependencies": {}
        }
        EOF

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.APP_NAME }}
        package: ./deploy

    - name: Restart app
      run: |
        az webapp restart --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.APP_NAME }}

    - name: Smoke test (auto-rollback gate)
      # If the deployed site doesn't return real SSR content within 3 minutes,
      # fail the job. The previous git ref is still on the App Service from the
      # prior successful deploy, so a maintainer can `git revert` immediately.
      run: |
        echo "⏳ Waiting up to 3 minutes for SSR to come up..."
        for i in $(seq 1 36); do
          BODY=$(curl -fsS --max-time 8 https://antsa.ai/ 2>/dev/null || true)
          if echo "$BODY" | grep -q 'Application Error'; then
            echo "  [$i/36] still showing Azure error page..."
          elif echo "$BODY" | grep -q '<h1'; then
            echo "✅ Site is responding with content."
            BOT_BODY=$(curl -fsS --max-time 8 -H 'User-Agent: GPTBot/1.2' https://antsa.ai/ 2>/dev/null || true)
            if echo "$BOT_BODY" | grep -q '<h1'; then
              echo "✅ Bot UA also gets content."
              exit 0
            fi
            echo "❌ Bot UA didn't get content."
            exit 1
          else
            echo "  [$i/36] no usable response yet..."
          fi
          sleep 5
        done
        echo "❌ Site never came up. Manually revert with: git revert HEAD && git push"
        exit 1
